<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="128" height="64" rx="26" fill="url(#shine)"/>

  <!-- I-Pipe symbol (white): flanged pipe connector -->
  <!-- Top flange (horizontal bar) -->
  <rect x="20" y="22" width="88" height="26" rx="10" fill="white" opacity="0.95"/>
  <!-- Stem (vertical connector) -->
  <rect x="52" y="48" width="24" height="32" fill="white" opacity="0.95"/>
  <!-- Bottom flange (horizontal bar) -->
  <rect x="20" y="80" width="88" height="26" rx="10" fill="white" opacity="0.95"/>

  <!-- Three flow dots on the top flange — data pipeline detail -->
  <circle cx="46" cy="35" r="4.5" fill="#4338ca" opacity="0.55"/>
  <circle cx="64" cy="35" r="4.5" fill="#4338ca" opacity="0.4"/>
  <circle cx="82" cy="35" r="4.5" fill="#4338ca" opacity="0.25"/>
</svg>
